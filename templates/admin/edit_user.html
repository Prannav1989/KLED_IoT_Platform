{% extends "admin/base.html" %}
{% block content %}
<div class="container">
    <h2 class="my-4">Edit User: {{ user.username }}</h2>
    
    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin.edit_user', user_id=user.id) }}">
                {{ form.hidden_tag() }}  <!-- CSRF protection -->
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="role" class="form-label">Role</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="super_admin" {% if user.role == 'super_admin' %}selected{% endif %}>Super Admin</option>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                            <option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="parent_admin" class="form-label">Parent Admin</label>
                        <select class="form-select" id="parent_admin" name="parent_admin">
                            <option value="">None</option>
                            {% for admin in admins %}
                            <option value="{{ admin.id }}" {% if user.parent_admin_id == admin.id %}selected{% endif %}>
                                {{ admin.username }} ({{ admin.role }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="new_password" class="form-label">New Password (leave blank to keep current)</label>
                    <input type="password" class="form-control" id="new_password" name="new_password">
                </div>
                
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('admin.manage_users') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
