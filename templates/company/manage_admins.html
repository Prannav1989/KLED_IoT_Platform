{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2><i class="fas fa-users me-2 text-primary"></i>Manage Admins for {{ company.name }}</h2>

    <form method="POST" class="mb-4">
        <div class="input-group">
            <select name="user_id" class="form-select">
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }} ({{ user.email }})</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary">Add as Admin</button>
        </div>
    </form>

    <h5>Current Admins</h5>
    {% if admins %}
    <ul class="list-group">
        {% for admin in admins %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ admin.username }}
            <form method="POST" action="{{ url_for('company.remove_admin', company_id=company.id, user_id=admin.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
            </form>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-muted">No admins assigned yet.</p>
    {% endif %}
</div>
{% endblock %}
