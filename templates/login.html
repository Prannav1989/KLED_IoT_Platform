<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | IoT Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

<div class="card login-card p-4 shadow-sm">

    <!-- Logo -->
    <div class="text-center mb-3">
        <img
            src="{{ url_for('static', filename='images/kled-logo.png') }}"
            alt="KLED IoT"
            class="img-fluid"
            style="max-height: 70px;">
    </div>

    <!-- Title -->
    <h4 class="text-center mb-1">IoT Platform Login</h4>
    <p class="text-center text-muted mb-3">Version 1.1.0</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Login Form -->
    <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Username -->
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                placeholder="Enter username"
                required
                autofocus>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Enter password"
                required>
        </div>

        <!-- Remember Me -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
            <label class="form-check-label" for="remember_me">
                Remember me
            </label>
        </div>

        <!-- Submit -->
        <div class="d-grid">
            <button type="submit" class="btn btn-primary">
                Login
            </button>
        </div>
    </form>

    <!-- Links -->
    <div class="text-center mt-3">
        <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
    </div>

    <div class="text-center mt-2">
        Don’t have an account?
        <a href="{{ url_for('auth.register') }}">Register</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
